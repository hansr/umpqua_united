---
layout: default
---

<section class="page-header">
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

<section class="doc-page {% if page.toc %}doc-page--with-toc{% endif %}">
  <div class="container {% if page.toc %}doc-with-toc{% endif %}">
    {% if page.toc %}
    <nav class="doc-toc" aria-label="Table of contents" id="doc-toc">
      <h2 class="doc-toc__title">Contents</h2>
      <ul class="doc-toc__list"></ul>
    </nav>
    {% endif %}
    <div class="doc-content">
      {{ content }}
    </div>
  </div>
</section>
